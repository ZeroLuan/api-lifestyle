databaseChangeLog:
  - changeSet:
      id: 202604261331-create-table-achievements
      author: luan
      changes:
        - createTable:
            tableName: achievements
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: criterion
                  type: varchar(255)
                  constraints:
                    nullable: false
